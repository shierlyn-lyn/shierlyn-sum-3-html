<main class="card">
    <h1 id="title">Daftar Akunmu</h1>

    <form id="daftar" action="sumatif.html">

      <div class="row">
        <label>Nama Lengkap *</label>
        <input type="text" id="name" placeholder="Contoh: Budi Santoso" required>

        <label>Username *</label>
        <input type="text"id="user" placeholder="Contoh: Lyn_Pandora" required>

        <label>Email *</label>
        <input type="email" placeholder="email@contoh.com" required>

        <label>Password *</label>
        <input type="password" id="pass" placeholder="123456_lyn" required>
      
        <label>Konfirmasi Password *</label>
        <input type="password" id="confirm" placeholder="123456_lyn" required>
      
        <label>No. Telepon *</label>
        <input type="tel" placeholder="+62 812 3456 7890" required>
      </div>
	  <button type="submit">Daftar Sekarang</button>
    </form>
